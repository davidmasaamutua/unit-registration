<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Student Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Create Student Account</h1>
        <p>Please fill in the details below to create your student account.<br>
        Ensure that the information provided is correct before submitting.</p>
        
        <form id="registerForm">
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" required>
            
            <label for="regNumber">Registration Number:</label>
            <input type="text" id="regNumber" name="regNumber" required>
            
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="course">Course / Programme:</label>
            <input type="text" id="course" name="course" required>
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            
            <label for="confirmPassword">Confirm Password:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>
            
            <button type="submit">Create Account</button>
            <button type="reset">Reset</button>
            <button type="button" onclick="window.location.href='index.html'">Cancel</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
